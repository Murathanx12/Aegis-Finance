# Aegis Finance — Smallmid-Quality Lane Configuration (TRIAL-SMQ-FWD)
# ====================================================================
#
# A SINGLE new lane `smallmid-quality`: the BRAIN-007 composite book (top-30 by
# mean winsorized z of PIT gross profitability + opportunistic-insider 12m flag)
# held equal-weight, buy-and-hold. Pre-registered in docs/TRIALS/TRIAL-SMQ-FWD.md.
#
# WHY A SEPARATE FILE (load-bearing — identical reasoning to book_lanes.yaml and
# conservative_atr_lanes.yaml): paper_portfolios.yaml's WHOLE-FILE hash versions
# the 4 reference lanes; adding a lane there would fire a spurious boundary
# rebalance on all of them. This lane lives here with its OWN independent hash
# (db.get_smq_config_hash) and its own env-gated seeding path.
#
# HOLDINGS ARE PART OF THE CONFIG HASH (deliberate): the book IS the strategy.
# Quarterly refresh = NEW file content = NEW hash = stamped config-change
# boundary through the guarded evolution loop. Never edit in place mid-quarter.
#
# Provenance: brain module commit a64d7e5, artifact
# backend/data/smallmid_quality_book.json (formed 2026-07-22; universe 1447;
# panel_end 2024-12; insider filings through 2026-03).
#
# SEEDING DISCIPLINE: inception = seed day, current prices, $100k, EW. NO
# reconstructed past. Attended + env-gated (AEGIS_SEED_SMALLMID_QUALITY=1).
# <=3 unpriceable tickers drop LOUDLY at seed; >3 refuses.

smallmid-quality:
