# Aegis Finance — Paper Portfolio Configuration
# ==============================================
#
# Single source of truth for all reference portfolio rules.
# All numbers here; never hardcoded in service files.
# Tuning happens via config edits + replay backtest, never by silent code changes.
#
# Config is read-only at process start. Versioned via SHA-256 hash
# stored in PaperPortfolio.config_version.

# ── Ticker Universe ──────────────────────────────────────────────────────────
# Frozen quarterly. New names enter only at quarterly review.
# This prevents survivorship-bias drift in backtesting.

universe:
  frozen_until: "2026-07-01"  # next quarterly review date

  # 11 S&P sector ETFs
  sector_etfs:
    - XLK   # Technology
    - XLV   # Health Care
    - XLF   # Financials
    - XLE   # Energy
    - XLY   # Consumer Discretionary
    - XLP   # Consumer Staples
    - XLI   # Industrials
    - XLU   # Utilities
    - XLRE  # Real Estate
    - XLB   # Materials
    - XLC   # Communication Services

  # 6 broad equity ETFs
  broad_equity:
    - SPY   # S&P 500
    - QQQ   # Nasdaq 100
    - IWM   # Russell 2000
    - VTI   # Total US Stock Market
    - VEA   # Developed International
    - VWO   # Emerging Markets

  # 7 bond ETFs
  bond_etfs:
    - AGG   # US Aggregate Bond
    - TLT   # 20+ Year Treasury
    - IEF   # 7-10 Year Treasury
    - SHY   # 1-3 Year Treasury
    - LQD   # Investment Grade Corporate
    - HYG   # High Yield Corporate
    - TIP   # Treasury Inflation-Protected

  # 4 alternatives (commodity / real asset)
  alternatives:
    - GLD   # Gold
    - IAU   # Gold (iShares)
    - USO   # Crude Oil
    - VNQ   # Real Estate (REIT)

  # ~52 representative individual stocks across sectors
  individual_stocks:
    technology:
      - AAPL  # Apple
      - MSFT  # Microsoft
      - GOOGL # Alphabet
      - META  # Meta Platforms
      - NVDA  # NVIDIA
      - AMD   # Advanced Micro Devices
      - AVGO  # Broadcom
      - CRM   # Salesforce
      - ADBE  # Adobe
      - ORCL  # Oracle
      - TSM   # Taiwan Semi

    semiconductors:
      - MRVL  # Marvell
      - MU    # Micron
      - INTC  # Intel

    consumer_internet:
      - AMZN  # Amazon
      - NFLX  # Netflix
      - DKNG  # DraftKings
      - TTWO  # Take-Two Interactive

    healthcare_biotech:
      - LLY   # Eli Lilly
      - JNJ   # Johnson & Johnson
      - UNH   # UnitedHealth
      - ABBV  # AbbVie
      - PFE   # Pfizer
      - DHR   # Danaher

    financials:
      - JPM   # JPMorgan Chase
      - GS    # Goldman Sachs
      - V     # Visa
      - MA    # Mastercard

    energy_materials:
      - XOM   # ExxonMobil
      - CVX   # Chevron
      - FSLR  # First Solar
