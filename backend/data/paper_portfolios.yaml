# ── Lane Definitions ─────────────────────────────────────────────────────────
# Three rules-based reference portfolios + one personal conviction tracker.
# Differ on risk tolerance, not predictions.

conservative:
  # Capital preservation — lowest equity, highest bonds
  target_equity_pct: 0.40      # 40% equities
  target_bond_pct: 0.50        # 50% bonds
  target_alt_pct: 0.10         # 10% alternatives (gold, REIT)
  optimizer: hrp                # HRP on bonds, equal-weight on equity sleeve
  max_single_name: 0.03        # no single position > 3%
  max_sector: 0.25             # no sector > 25%
  rebalance_trigger_drift: 0.05  # rebalance when any weight drifts > 5%
  rebalance_frequency: monthly   # also check monthly regardless of drift
  crash_overlay:
    crash_prob_threshold: 0.25   # arm crash overlay when 3m prob > 25%
    equity_cut_pct: 0.20         # cut equity allocation by 20% (e.g., 40% → 32%)
  transaction_cost_bps: 5       # 5 basis points per trade
  slippage_bps: 1               # 1 basis point slippage estimate

balanced:
  # Balanced growth + income — Black-Litterman with macro views
  target_equity_pct: 0.70
  target_bond_pct: 0.25
  target_alt_pct: 0.05
  optimizer: black-litterman
  max_single_name: 0.05
  max_sector: 0.30
  rebalance_trigger_drift: 0.05
  rebalance_frequency: monthly
  crash_overlay:
    crash_prob_threshold: 0.30
    equity_cut_pct: 0.15
  transaction_cost_bps: 5
  slippage_bps: 1

aggressive:
  # Maximum growth — full equity universe via HRP
  target_equity_pct: 0.95
  target_bond_pct: 0.05
  target_alt_pct: 0.00
  optimizer: hrp
  max_single_name: 0.08
  max_sector: 0.40
  rebalance_trigger_drift: 0.07
  rebalance_frequency: weekly
  crash_overlay:
    crash_prob_threshold: 0.40
    equity_cut_pct: 0.10
  transaction_cost_bps: 5
  slippage_bps: 1

# ── Personal Conviction Lane ─────────────────────────────────────────────────
# Author's real portfolio tracked for honest skill measurement.
# NOT a recommendation engine. Measures whether conviction adds value.

personal:
  test_fixture_tickers:
    - TVTX
    - DKNG
    - ALMS
    - MSTR
    - APLT
    - FSLR
    - AMZN
    - TTWO
    - SLDP
    - MRVL
    - RGTI
    - APMX
    - NTLA
  benchmark: SPY
  skill_min_months: 24          # don't claim skill until 24 months of tracked decisions
  skill_min_t_stat: 2.0         # require t-stat > 2 for skill significance
  rationale_min_chars: 50       # every decision needs >= 50 chars of written reasoning

# ── Inception Parameters ─────────────────────────────────────────────────────

inception:
  notional_usd: 100000.0       # each reference portfolio starts with $100k
  benchmarks:
    - SPY                       # S&P 500 equity benchmark
    - AGG                       # US aggregate bond benchmark
    - 60-40                     # classic 60% SPY / 40% AGG blend
