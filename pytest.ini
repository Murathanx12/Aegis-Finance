[pytest]
# Markers (also registered in backend/tests/conftest.py for older runs).
markers =
    slow: network / data-fetching tests — excluded from the fast suite (-m "not slow")
    network: intentionally hits the live network — excluded from the fast suite

# Hard per-test timeout BACKSTOP. The 2026-06-14 grind session's "fast" suite hung
# for 2.5h because a non-slow test silently made a live yfinance/FRED call with no
# timeout. This cap converts any such hang into a fast, loud failure. `thread`
# method is the cross-platform one (signal/SIGALRM is unix-only → required on
# Windows). 600s is generous enough for the slowest legitimate slow test (~5min
# e2e replay) while still killing a true hang. The fast suite never approaches it
# because non-slow tests are blocked from the network entirely (see conftest).
timeout = 600
timeout_method = thread
