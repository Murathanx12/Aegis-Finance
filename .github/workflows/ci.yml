name: CI

# Validated-real review item H3. Catches the regression class the external reviews
# flagged (dep-CVE drift, version drift, type errors) continuously and for free.
# Design choices (see docs/BACKLOG.md H3):
#   - pytest runs the FAST suite only: it is network-BLOCKED (backend/tests/conftest.py)
#     and per-test-timeout-guarded (pytest.ini), so CI is deterministic and offline.
#   - ruff + pip-audit start ADVISORY (continue-on-error) so the first runs aren't
#     red on pre-existing lint / unpinned-dep findings. Ratchet them to blocking
#     once clean.
#   - the slow (network, API-key) suite is intentionally NOT in CI.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: backend (pytest offline + ruff + pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install ruff pip-audit
      - name: Ruff (advisory)
        continue-on-error: true
        run: ruff check backend engine
      - name: pip-audit (advisory — surfaces real CVEs against resolved deps)
        continue-on-error: true
        run: pip-audit || true
      - name: Pytest (fast suite — offline, blocking)
        run: python -m pytest backend/tests/ -m "not slow" -q

  frontend:
    name: frontend (next build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        working-directory: frontend
        run: npm ci
      - name: Build (catches type errors)
        working-directory: frontend
        run: npx next build
